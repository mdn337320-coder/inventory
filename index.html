<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Pro Inventory Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #f1f5f9; padding-bottom: 80px; }
        .tab-active { background-color: #3b82f6; color: white; border-radius: 2rem; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; font-size: 14px; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input, select, textarea { font-size: 16px !important; }
        .scanner-container { border-radius: 1rem; overflow: hidden; background: #000; }
    </style>
</head>
<body>
<div class="max-w-2xl mx-auto px-4 pt-5">
    <!-- Header -->
    <div class="flex justify-between items-center bg-white p-3 rounded-2xl shadow-sm mb-5">
        <h1 class="font-bold text-xl"><i class="fas fa-boxes text-blue-600"></i> Pro InvManager</h1>
        <select id="workerSelect" class="bg-gray-100 p-2 rounded-full text-sm font-medium">
            <option value="">Select Worker</option>
        </select>
    </div>

    <!-- Tabs -->
    <div class="flex bg-white rounded-2xl p-1 mb-6 sticky top-2 z-10">
        <button data-tab="dashboard" class="tab-btn flex-1 py-2 rounded-xl"><i class="fas fa-chart-line"></i> Dashboard</button>
        <button data-tab="scan" class="tab-btn flex-1 py-2 rounded-xl"><i class="fas fa-camera"></i> Scan</button>
        <button data-tab="inventory" class="tab-btn flex-1 py-2 rounded-xl"><i class="fas fa-archive"></i> Inventory</button>
        <button data-tab="workers" class="tab-btn flex-1 py-2 rounded-xl"><i class="fas fa-users"></i> Workers</button>
    </div>

    <!-- Dashboard Tab -->
    <div id="dashboardTab" class="tab-content space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-2xl"><p class="text-gray-500 text-xs">Total Products</p><p id="totalProducts" class="text-2xl font-bold">--</p></div>
            <div class="bg-white p-4 rounded-2xl"><p class="text-gray-500 text-xs">Low Stock</p><p id="lowStockCount" class="text-2xl font-bold text-red-600">--</p></div>
            <div class="bg-white p-4 rounded-2xl"><p class="text-gray-500 text-xs">📥 Today IN</p><p id="todayIn" class="text-xl font-bold">--</p></div>
            <div class="bg-white p-4 rounded-2xl"><p class="text-gray-500 text-xs">📤 Today OUT</p><p id="todayOut" class="text-xl font-bold">--</p></div>
        </div>
        <div class="bg-white rounded-2xl p-3"><h3 class="font-semibold mb-2">⚠️ Low Stock Alerts</h3><div id="lowStockList" class="divide-y"></div></div>
        <div class="bg-white rounded-2xl p-3"><h3 class="font-semibold mb-2">📋 Recent Activity</h3><div id="recentTransactions" class="space-y-2 text-sm"></div></div>
    </div>

    <!-- Scan Tab -->
    <div id="scanTab" class="tab-content hidden space-y-4">
        <div class="bg-white p-4 rounded-2xl space-y-4">
            <div class="flex gap-2">
                <input type="text" id="barcodeInput" placeholder="Scan or type barcode" class="flex-1 border rounded-xl px-4 py-3">
                <button id="startScannerBtn" class="bg-blue-600 text-white px-4 rounded-xl"><i class="fas fa-camera"></i></button>
            </div>
            <div id="qrScannerContainer" style="display:none;" class="scanner-container rounded-xl"></div>
            <div id="productInfoCard" class="hidden bg-gray-50 p-3 rounded-xl">
                <p class="font-bold" id="scanProductName"></p>
                <p>Stock: <span id="scanCurrentStock"></span> <span id="scanUnit"></span></p>
            </div>
            <div class="flex gap-3">
                <button id="typeInBtn" class="flex-1 py-2 rounded-xl bg-green-100 text-green-700">📥 Stock IN</button>
                <button id="typeOutBtn" class="flex-1 py-2 rounded-xl bg-red-100 text-red-700">🛒 Stock OUT</button>
            </div>
            <div class="flex justify-between items-center">
                <span>Quantity:</span>
                <div class="flex gap-2 bg-gray-100 rounded-full p-1">
                    <button id="qtyMinus" class="w-10 h-10 rounded-full bg-white shadow">-</button>
                    <input id="quantityInput" type="number" value="1" min="1" class="w-16 text-center bg-transparent text-lg">
                    <button id="qtyPlus" class="w-10 h-10 rounded-full bg-white shadow">+</button>
                </div>
            </div>
            <input type="text" id="notesInput" placeholder="Note (order # / supplier)" class="w-full border rounded-xl p-2">
            <button id="confirmBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">✅ Confirm & Update Stock</button>
        </div>
        <p class="text-center text-xs text-gray-400">Scan barcode → set quantity → confirm. Stock updates instantly.</p>
    </div>

    <!-- Inventory Tab -->
    <div id="inventoryTab" class="tab-content hidden space-y-3">
        <input type="text" id="invSearch" placeholder="Search by name or barcode..." class="w-full border rounded-xl p-2">
        <div id="inventoryList" class="space-y-2 max-h-[70vh] overflow-auto"></div>
    </div>

    <!-- Workers Tab -->
    <div id="workersTab" class="tab-content hidden space-y-3">
        <div class="flex gap-2">
            <input type="text" id="newWorkerName" placeholder="New worker name" class="flex-1 border rounded-xl p-2">
            <button id="addWorkerBtn" class="bg-blue-600 text-white px-4 rounded-xl">Add</button>
        </div>
        <div id="workersList" class="bg-white rounded-2xl divide-y"></div>
    </div>
</div>

<!-- Modal for product edit/history -->
<div id="productModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white w-full max-w-md rounded-2xl p-5 max-h-[80vh] overflow-auto mx-4">
        <div class="flex justify-between border-b pb-2"><h3 class="font-bold" id="modalTitle">Edit Product</h3><button id="closeModalBtn"><i class="fas fa-times"></i></button></div>
        <input type="hidden" id="editBarcode">
        <div class="mt-3 space-y-3">
            <input type="text" id="editName" placeholder="Product Name" class="w-full border rounded-lg p-2">
            <input type="text" id="editCategory" placeholder="Category" class="w-full border rounded-lg p-2">
            <input type="text" id="editUnit" placeholder="Unit (pcs, kg)" class="w-full border rounded-lg p-2">
            <input type="number" id="editMinAlert" placeholder="Min stock alert" class="w-full border rounded-lg p-2">
            <button id="saveProductBtn" class="bg-green-600 text-white w-full py-2 rounded-xl">Save Changes</button>
            <hr><h4 class="font-semibold">Transaction History</h4><div id="historyList" class="text-xs space-y-2 max-h-52 overflow-auto"></div>
        </div>
    </div>
</div>

<script>
    // ========== ✅ YOUR CORRECT WEB APP URL (updated) ==========
    const API_URL = "https://script.google.com/macros/s/AKfycbzOfaZgiS57HaWtVAg7FRTmSXCuIh0GwDTYIjvNWdJd_ygJE5NGtWinpw7aXDFquTno/exec";
    // ============================================================

    let currentProduct = null;
    let transactionType = "OUT";
    let scanner = null;

    async function callApi(action, data = {}) {
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ request: JSON.stringify({ action, ...data }) })
            });
            const text = await res.text();
            let json;
            try {
                json = JSON.parse(text);
            } catch(e) {
                console.error("Invalid JSON response:", text.substring(0, 200));
                throw new Error("Backend returned HTML instead of JSON. Check Apps Script deployment (Execute as: Me, Access: Anyone)");
            }
            if (!json.success) throw new Error(json.error);
            return json.data;
        } catch (err) {
            showToast(err.message, true);
            throw err;
        }
    }

    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        if (isErr) t.style.background = '#b91c1c';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function loadWorkers() {
        try {
            const workers = await callApi('getWorkers');
            const sel = document.getElementById('workerSelect');
            const old = sel.value;
            sel.innerHTML = '<option value="">-- Select Worker --</option>';
            workers.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w;
                opt.innerText = w;
                if (old === w) opt.selected = true;
                sel.appendChild(opt);
            });
            document.getElementById('workersList').innerHTML = workers.map(w => `<div class="p-3"><i class="fas fa-user mr-2"></i>${w}</div>`).join('');
        } catch(e) { console.error(e); showToast("Failed to load workers", true); }
    }

    async function refreshDashboard() {
        try {
            const stats = await callApi('getDashboardStats');
            document.getElementById('totalProducts').innerText = stats.totalProducts;
            document.getElementById('lowStockCount').innerText = stats.lowStockCount;
            document.getElementById('todayIn').innerText = stats.todayIns;
            document.getElementById('todayOut').innerText = stats.todayOuts;
            document.getElementById('lowStockList').innerHTML = stats.lowStockProducts.map(p => `<div class="py-2 flex justify-between"><span>${p.Name}</span><span class="text-red-600">${p.Stock}/${p.MinAlert}</span></div>`).join('') || '<div class="text-gray-400">✅ All good</div>';
            document.getElementById('recentTransactions').innerHTML = stats.recentTransactions.map(t => `<div class="flex justify-between border-b pb-1"><span>${t.Type} ${t.Qty} ${t.Product}</span><span class="text-xs">${t.Worker} ${t.Time}</span></div>`).join('');
        } catch(e) { console.error(e); showToast("Failed to load dashboard", true); }
    }

    async function loadInventory(search = '') {
        try {
            let products = await callApi('getProducts');
            if (search) products = products.filter(p => p.Name.toLowerCase().includes(search) || p.Barcode.includes(search));
            const container = document.getElementById('inventoryList');
            if (products.length === 0) {
                container.innerHTML = '<div class="bg-white p-4 text-center text-gray-400 rounded-2xl">No products yet. Scan a barcode and add stock.</div>';
                return;
            }
            container.innerHTML = products.map(p => `<div class="bg-white p-3 rounded-xl shadow-sm flex justify-between items-center"><div><p class="font-semibold">${p.Name}</p><p class="text-xs">Stock: ${p.Stock} ${p.Unit}</p></div><button class="edit-btn text-blue-600" data-barcode="${p.Barcode}"><i class="fas fa-edit"></i></button></div>`).join('');
            document.querySelectorAll('.edit-btn').forEach(btn => btn.onclick = () => openModal(btn.dataset.barcode));
        } catch(e) { console.error(e); showToast("Failed to load inventory", true); }
    }

    async function lookupBarcode(barcode) {
        if (!barcode) return;
        try {
            const prod = await callApi('getProductByBarcode', { barcode });
            const card = document.getElementById('productInfoCard');
            if (prod) {
                currentProduct = prod;
                document.getElementById('scanProductName').innerText = prod.Name;
                document.getElementById('scanCurrentStock').innerText = prod.Stock;
                document.getElementById('scanUnit').innerText = prod.Unit || '';
                card.classList.remove('hidden');
            } else {
                currentProduct = null;
                card.classList.add('hidden');
                showToast("New product! Will be created on first IN", false);
            }
        } catch(e) { console.error(e); showToast("Error looking up barcode", true); }
    }

    async function confirmTransaction() {
        const worker = document.getElementById('workerSelect').value;
        if (!worker) { showToast("Select a worker", true); return; }
        const barcode = document.getElementById('barcodeInput').value.trim();
        if (!barcode) { showToast("Enter or scan barcode", true); return; }
        let qty = parseInt(document.getElementById('quantityInput').value);
        if (isNaN(qty) || qty < 1) qty = 1;
        const notes = document.getElementById('notesInput').value;
        
        try {
            if (!currentProduct && transactionType === 'IN') {
                const name = prompt("New product name:");
                if (!name) return;
                const category = prompt("Category", "General");
                const unit = prompt("Unit (pcs, kg)", "pcs");
                await callApi('addNewProduct', { barcode, name, category, unit, initialStock: qty });
                await callApi('processTransaction', { worker, barcode, type: 'IN', qty, notes });
                showToast(`New product "${name}" added with stock ${qty}`);
            } else {
                await callApi('processTransaction', { worker, barcode, type: transactionType, qty, notes });
                showToast(`${transactionType} ${qty} → stock updated`);
            }
            document.getElementById('barcodeInput').value = '';
            document.getElementById('quantityInput').value = '1';
            document.getElementById('notesInput').value = '';
            document.getElementById('productInfoCard').classList.add('hidden');
            currentProduct = null;
            refreshDashboard();
            loadInventory();
        } catch(e) { showToast(e.message, true); }
    }

    function startCamera() {
        const container = document.getElementById('qrScannerContainer');
        container.style.display = 'block';
        container.innerHTML = '<div id="reader" style="width:100%"></div>';
        const html5Qr = new Html5Qrcode("reader");
        scanner = html5Qr;
        html5Qr.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, decoded => {
            document.getElementById('barcodeInput').value = decoded;
            lookupBarcode(decoded);
            html5Qr.stop();
            container.style.display = 'none';
        }, err => console.warn(err));
    }

    async function openModal(barcode) {
        try {
            const product = await callApi('getProductByBarcode', { barcode });
            document.getElementById('editBarcode').value = barcode;
            document.getElementById('editName').value = product.Name;
            document.getElementById('editCategory').value = product.Category || '';
            document.getElementById('editUnit').value = product.Unit || '';
            document.getElementById('editMinAlert').value = product.MinAlert || 0;
            const history = await callApi('getProductHistory', { barcode });
            document.getElementById('historyList').innerHTML = history.map(h => `<div>${h.Date} ${h.Type} ${h.Qty} → ${h.StockAfter} (${h.Worker})</div>`).join('') || '<div>No history</div>';
            document.getElementById('productModal').classList.remove('hidden');
        } catch(e) { showToast("Failed to load product details", true); }
    }

    async function saveProduct() {
        const barcode = document.getElementById('editBarcode').value;
        const updates = {
            Name: document.getElementById('editName').value,
            Category: document.getElementById('editCategory').value,
            Unit: document.getElementById('editUnit').value,
            MinAlert: parseInt(document.getElementById('editMinAlert').value) || 0
        };
        try {
            await callApi('updateProduct', { barcode, updates });
            showToast("Product updated");
            document.getElementById('productModal').classList.add('hidden');
            refreshDashboard();
            loadInventory();
        } catch(e) { showToast("Update failed", true); }
    }

    // Event bindings
    document.getElementById('startScannerBtn').onclick = startCamera;
    document.getElementById('typeInBtn').onclick = () => { transactionType = "IN"; document.getElementById('typeInBtn').classList.add('bg-green-200', 'text-green-800'); document.getElementById('typeOutBtn').classList.remove('bg-red-200', 'text-red-800'); document.getElementById('typeOutBtn').classList.add('bg-red-100', 'text-red-700'); };
    document.getElementById('typeOutBtn').onclick = () => { transactionType = "OUT"; document.getElementById('typeOutBtn').classList.add('bg-red-200', 'text-red-800'); document.getElementById('typeInBtn').classList.remove('bg-green-200', 'text-green-800'); document.getElementById('typeInBtn').classList.add('bg-green-100', 'text-green-700'); };
    document.getElementById('confirmBtn').onclick = confirmTransaction;
    document.getElementById('qtyMinus').onclick = () => { let inp = document.getElementById('quantityInput'); if (inp.value > 1) inp.value--; };
    document.getElementById('qtyPlus').onclick = () => { let inp = document.getElementById('quantityInput'); inp.value++; };
    document.getElementById('addWorkerBtn').onclick = async () => { const name = document.getElementById('newWorkerName').value.trim(); if(name) { await callApi('addWorker', { workerName: name }); loadWorkers(); document.getElementById('newWorkerName').value = ''; showToast(`Worker "${name}" added`); } };
    document.getElementById('invSearch').addEventListener('input', e => loadInventory(e.target.value));
    document.getElementById('saveProductBtn').onclick = saveProduct;
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('productModal').classList.add('hidden');

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(btn.dataset.tab + 'Tab').classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'bg-blue-600', 'text-white'));
            btn.classList.add('tab-active', 'bg-blue-600', 'text-white');
            if (btn.dataset.tab === 'dashboard') refreshDashboard();
            if (btn.dataset.tab === 'inventory') loadInventory();
            if (btn.dataset.tab === 'workers') loadWorkers();
        };
    });
    // Start with dashboard tab active
    document.querySelector('.tab-btn[data-tab="dashboard"]').click();
    loadWorkers();
</script>
</body>
</html>
