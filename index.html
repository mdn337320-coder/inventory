<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Store Inventory Manager</title>
    <!-- Tailwind CSS for clean, responsive UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html5-qrcode for camera scanning -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Custom styles for better mobile experience */
        body { background: #f1f5f9; padding-bottom: 80px; }
        .tab-active { background-color: #3b82f6; color: white; border-radius: 2rem; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; font-size: 14px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        input, select, textarea { font-size: 16px !important; } /* Prevents zoom on mobile */
        .scanner-container { border-radius: 1rem; overflow: hidden; background: #000; }
    </style>
</head>
<body class="font-sans antialiased">

<div class="max-w-2xl mx-auto px-4 pt-5">
    <!-- Header with Worker Selector -->
    <div class="flex flex-wrap justify-between items-center gap-2 bg-white p-3 rounded-2xl shadow-sm mb-5">
        <div class="flex items-center gap-2">
            <i class="fas fa-boxes text-blue-600 text-xl"></i>
            <h1 class="font-bold text-gray-800 text-lg">InvManager</h1>
        </div>
        <div class="flex items-center gap-2 bg-gray-100 px-3 py-1.5 rounded-full">
            <i class="fas fa-user-circle text-gray-500"></i>
            <select id="workerSelect" class="bg-transparent text-sm font-medium focus:outline-none pr-2">
                <option value="">Select Worker</option>
            </select>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="flex bg-white rounded-2xl shadow-sm p-1 mb-6 sticky top-2 z-10">
        <button data-tab="dashboard" class="tab-btn flex-1 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2"><i class="fas fa-chart-line"></i><span>Dashboard</span></button>
        <button data-tab="scan" class="tab-btn flex-1 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2"><i class="fas fa-camera"></i><span>Scan</span></button>
        <button data-tab="inventory" class="tab-btn flex-1 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2"><i class="fas fa-archive"></i><span>Inventory</span></button>
        <button data-tab="workers" class="tab-btn flex-1 py-2.5 rounded-xl text-sm font-medium transition flex items-center justify-center gap-2"><i class="fas fa-users"></i><span>Workers</span></button>
    </div>

    <!-- Dashboard Tab -->
    <div id="dashboardTab" class="tab-content space-y-5">
        <!-- Stats Cards -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-xs">Total Products</p>
                <p id="totalProducts" class="text-2xl font-bold">--</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-red-400">
                <p class="text-gray-500 text-xs">Low Stock Items</p>
                <p id="lowStockCount" class="text-2xl font-bold text-red-600">--</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <p class="text-gray-500 text-xs"><i class="fas fa-arrow-down text-green-600"></i> Today IN</p>
                <p id="todayIn" class="text-xl font-bold">--</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm">
                <p class="text-gray-500 text-xs"><i class="fas fa-arrow-up text-orange-600"></i> Today OUT</p>
                <p id="todayOut" class="text-xl font-bold">--</p>
            </div>
        </div>
        <!-- Low Stock Alert List -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="px-4 py-3 border-b bg-gray-50 font-semibold text-gray-700"><i class="fas fa-exclamation-triangle text-amber-500 mr-2"></i> Low Stock Alerts</div>
            <div id="lowStockList" class="divide-y divide-gray-100 max-h-64 overflow-auto"></div>
        </div>
        <!-- Recent Transactions -->
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
            <div class="px-4 py-3 border-b bg-gray-50 font-semibold text-gray-700"><i class="fas fa-history mr-2"></i> Recent Activity</div>
            <div id="recentTransactions" class="divide-y divide-gray-100 text-sm"></div>
        </div>
    </div>

    <!-- Scan Tab (Core Operation) -->
    <div id="scanTab" class="tab-content hidden space-y-5">
        <div class="bg-white rounded-2xl shadow-sm p-4 space-y-4">
            <div class="flex gap-2">
                <input type="text" id="barcodeInput" placeholder="Scan or type barcode" class="flex-1 border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-300">
                <button id="manualLookupBtn" class="bg-gray-200 px-4 rounded-xl"><i class="fas fa-search"></i></button>
                <button id="startScannerBtn" class="bg-blue-600 text-white px-4 rounded-xl"><i class="fas fa-camera"></i></button>
            </div>
            <div id="qrScannerContainer" style="display:none;" class="scanner-container rounded-xl"></div>
            <div id="productInfoCard" class="bg-gray-50 rounded-xl p-3 hidden">
                <p class="text-xs text-gray-500">Product found</p>
                <p id="scanProductName" class="font-bold text-lg"></p>
                <p class="text-sm">Current stock: <span id="scanCurrentStock" class="font-mono font-semibold"></span> <span id="scanUnit"></span></p>
            </div>
            <div class="border-t pt-3">
                <div class="flex gap-3 mb-4">
                    <button id="typeInBtn" class="flex-1 py-2 rounded-xl bg-green-100 text-green-700 font-medium"><i class="fas fa-download"></i> 📥 Stock IN</button>
                    <button id="typeOutBtn" class="flex-1 py-2 rounded-xl bg-red-100 text-red-700 font-medium"><i class="fas fa-upload"></i> 🛒 Stock OUT</button>
                </div>
                <div class="flex items-center justify-between gap-3">
                    <label class="text-sm font-medium">Qty:</label>
                    <div class="flex items-center gap-2 bg-gray-100 rounded-full p-1">
                        <button id="qtyMinus" class="w-10 h-10 rounded-full bg-white shadow-sm text-xl font-bold">-</button>
                        <input id="quantityInput" type="number" value="1" min="1" class="w-16 text-center bg-transparent text-lg font-semibold">
                        <button id="qtyPlus" class="w-10 h-10 rounded-full bg-white shadow-sm text-xl font-bold">+</button>
                    </div>
                </div>
                <input type="text" id="notesInput" placeholder="Optional note (Order # / reason)" class="w-full mt-3 border rounded-xl px-3 py-2 text-sm">
                <button id="confirmTransactionBtn" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">✅ Confirm & Save to Sheet</button>
            </div>
        </div>
        <div class="bg-white rounded-2xl p-3 text-center text-xs text-gray-400">Make sure a worker is selected on top bar.</div>
    </div>

    <!-- Inventory Tab -->
    <div id="inventoryTab" class="tab-content hidden space-y-4">
        <div class="relative">
            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            <input type="text" id="invSearch" placeholder="Search by name or barcode..." class="w-full border border-gray-300 rounded-xl py-2.5 pl-10 pr-4">
        </div>
        <div id="inventoryList" class="space-y-3 max-h-[70vh] overflow-auto"></div>
    </div>

    <!-- Workers Tab -->
    <div id="workersTab" class="tab-content hidden space-y-4">
        <div class="flex gap-2">
            <input type="text" id="newWorkerName" placeholder="New worker name" class="flex-1 border rounded-xl px-4 py-2">
            <button id="addWorkerBtn" class="bg-blue-600 text-white px-5 rounded-xl"><i class="fas fa-plus"></i> Add</button>
        </div>
        <div id="workersList" class="bg-white rounded-2xl divide-y"></div>
    </div>
</div>

<!-- Modal for Product Details & History -->
<div id="productModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden transition-all">
    <div class="bg-white w-full max-w-md rounded-2xl p-5 max-h-[80vh] overflow-auto mx-4">
        <div class="flex justify-between items-center border-b pb-2">
            <h3 class="font-bold text-lg" id="modalTitle">Edit Product</h3>
            <button id="closeModalBtn"><i class="fas fa-times text-gray-500"></i></button>
        </div>
        <input type="hidden" id="editBarcode">
        <div class="mt-3 space-y-3">
            <input type="text" id="editName" placeholder="Product Name" class="w-full border rounded-lg p-2">
            <input type="text" id="editCategory" placeholder="Category" class="w-full border rounded-lg p-2">
            <input type="text" id="editUnit" placeholder="Unit (pcs, kg, box)" class="w-full border rounded-lg p-2">
            <input type="number" id="editMinAlert" placeholder="Min stock alert" class="w-full border rounded-lg p-2">
            <button id="saveProductBtn" class="bg-green-600 text-white w-full py-2 rounded-xl font-bold">Save Changes</button>
            <hr>
            <h4 class="font-semibold">Transaction History</h4>
            <div id="historyList" class="text-xs space-y-2 max-h-52 overflow-auto"></div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 1. SET YOUR WEB APP URL HERE (the one from Google Apps Script)
    // ============================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxnAFXNxK9RtZOOUidKQ3uqSGXkkJQxfprzDsrxdAiwrhXq6lg-THEaFJ5kOCsZh7t-Ag/exec";
    // ============================================================

    let currentProductScan = null;
    let transactionType = "OUT";     // default OUT
    let html5Scanner = null;
    let isScannerActive = false;

    // Helper: Show toast message
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if (isError) toast.style.background = '#b91c1c';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    // Unified API caller
    async function callApi(action, data = {}) {
        try {
            const payload = { action, ...data };
            const res = await fetch(API_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ request: JSON.stringify(payload) }).toString()
            });
            const json = await res.json();
            if (!json.success) throw new Error(json.error || "Request failed");
            return json.data;
        } catch (err) {
            showToast(err.message, true);
            throw err;
        }
    }

    // Load workers & populate dropdown
    async function loadWorkers() {
        try {
            const workers = await callApi('getWorkers');
            const select = document.getElementById('workerSelect');
            const currentVal = select.value;
            select.innerHTML = '<option value="">-- Select Worker --</option>';
            workers.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w;
                opt.innerText = w;
                if (currentVal === w) opt.selected = true;
                select.appendChild(opt);
            });
            // Render workers list in Workers tab
            const container = document.getElementById('workersList');
            if (container) {
                container.innerHTML = workers.map(w => `<div class="flex justify-between items-center p-3 border-b"><span><i class="fas fa-user-circle mr-2"></i>${w}</span></div>`).join('');
            }
        } catch (e) { console.error(e); }
    }

    // Dashboard summary
    async function refreshDashboard() {
        try {
            const stats = await callApi('getDashboardStats');
            document.getElementById('totalProducts').innerText = stats.totalProducts || 0;
            document.getElementById('lowStockCount').innerText = stats.lowStockCount || 0;
            document.getElementById('todayIn').innerText = stats.todayIns || 0;
            document.getElementById('todayOut').innerText = stats.todayOuts || 0;
            const lowListDiv = document.getElementById('lowStockList');
            if (stats.lowStockProducts && stats.lowStockProducts.length) {
                lowListDiv.innerHTML = stats.lowStockProducts.map(p => `<div class="p-3 flex justify-between"><div><span class="font-medium">${p.Name}</span><span class="text-xs text-gray-500 block">${p.Barcode}</span></div><span class="text-red-600 font-bold">${p.Stock} / ${p.MinAlert}</span></div>`).join('');
            } else {
                lowListDiv.innerHTML = '<div class="p-4 text-center text-gray-400">All stocks are healthy ✅</div>';
            }
            const recent = stats.recentTransactions || [];
            const recentDiv = document.getElementById('recentTransactions');
            if (recent.length) {
                recentDiv.innerHTML = recent.map(t => `<div class="p-3 text-sm flex justify-between"><span><i class="fas ${t.Type === 'IN' ? 'fa-arrow-down text-green-600' : 'fa-arrow-up text-red-500'}"></i> ${t.Product} (${t.Qty})</span><span class="text-gray-400 text-xs">${t.Time} ${t.Worker}</span></div>`).join('');
            } else {
                recentDiv.innerHTML = '<div class="p-4 text-center text-gray-400">No transactions yet</div>';
            }
        } catch (e) { console.error(e); }
    }

    // Load inventory list with search
    async function loadInventory(searchTerm = '') {
        try {
            let products = await callApi('getProducts');
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                products = products.filter(p => p.Name.toLowerCase().includes(term) || p.Barcode.toLowerCase().includes(term));
            }
            const container = document.getElementById('inventoryList');
            if (!products.length) {
                container.innerHTML = '<div class="bg-white p-8 text-center rounded-2xl text-gray-400">No products found</div>';
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center" data-barcode="${p.Barcode}">
                    <div>
                        <p class="font-semibold">${p.Name}</p>
                        <p class="text-xs text-gray-500">${p.Barcode} | ${p.Category || '-'}</p>
                        <p class="text-sm mt-1">Stock: <span class="font-bold ${p.Stock <= p.MinAlert ? 'text-red-600' : 'text-gray-800'}">${p.Stock} ${p.Unit}</span></p>
                    </div>
                    <button class="edit-product-btn bg-blue-50 text-blue-600 px-3 py-2 rounded-lg text-sm" data-barcode="${p.Barcode}"><i class="fas fa-edit"></i> Details</button>
                </div>
            `).join('');
            // Attach edit events
            document.querySelectorAll('.edit-product-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const barcode = btn.getAttribute('data-barcode');
                    openProductModal(barcode);
                });
            });
        } catch (e) { showToast("Failed load inventory", true); }
    }

    // Open modal with product details & history
    async function openProductModal(barcode) {
        try {
            const product = await callApi('getProductByBarcode', { barcode });
            if (!product) throw new Error("Product missing");
            document.getElementById('editBarcode').value = barcode;
            document.getElementById('editName').value = product.Name || '';
            document.getElementById('editCategory').value = product.Category || '';
            document.getElementById('editUnit').value = product.Unit || '';
            document.getElementById('editMinAlert').value = product.MinAlert || 0;
            document.getElementById('modalTitle').innerText = `Edit ${product.Name}`;
            // Load history
            const history = await callApi('getProductHistory', { barcode });
            const historyDiv = document.getElementById('historyList');
            if (history && history.length) {
                historyDiv.innerHTML = history.map(h => `<div class="border-b pb-1"><span class="font-mono">${h.Date}</span> ${h.Type} ${h.Qty} → Stock ${h.StockAfter} | ${h.Worker}</div>`).join('');
            } else {
                historyDiv.innerHTML = '<div class="text-gray-400">No transactions yet</div>';
            }
            document.getElementById('productModal').classList.remove('hidden');
        } catch (e) { showToast("Cannot load product details", true); }
    }

    // Save product edits
    async function saveProductEdit() {
        const barcode = document.getElementById('editBarcode').value;
        const name = document.getElementById('editName').value.trim();
        if (!name) { showToast("Product name required", true); return; }
        const updates = {
            Name: name,
            Category: document.getElementById('editCategory').value,
            Unit: document.getElementById('editUnit').value,
            MinAlert: parseInt(document.getElementById('editMinAlert').value) || 0
        };
        try {
            await callApi('updateProduct', { barcode, updates });
            showToast("Product updated!");
            document.getElementById('productModal').classList.add('hidden');
            refreshDashboard();
            loadInventory(document.getElementById('invSearch')?.value || '');
        } catch (e) { showToast("Update failed", true); }
    }

    // Lookup barcode
    async function lookupBarcode(barcode) {
        if (!barcode) return;
        try {
            const product = await callApi('getProductByBarcode', { barcode });
            const infoCard = document.getElementById('productInfoCard');
            if (product) {
                currentProductScan = product;
                document.getElementById('scanProductName').innerText = product.Name;
                document.getElementById('scanCurrentStock').innerText = product.Stock;
                document.getElementById('scanUnit').innerText = product.Unit || '';
                infoCard.classList.remove('hidden');
            } else {
                currentProductScan = null;
                infoCard.classList.add('hidden');
                showToast("New product! Fill details and do Stock IN to create", false);
            }
        } catch (e) {
            currentProductScan = null;
            document.getElementById('productInfoCard').classList.add('hidden');
        }
    }

    // Confirm transaction (IN/OUT)
    async function confirmTransaction() {
        const worker = document.getElementById('workerSelect').value;
        if (!worker) { showToast("Please select a worker from top bar", true); return; }
        let barcode = document.getElementById('barcodeInput').value.trim();
        if (!barcode) { showToast("Enter or scan barcode", true); return; }
        let qty = parseInt(document.getElementById('quantityInput').value);
        if (isNaN(qty) || qty <= 0) qty = 1;
        const notes = document.getElementById('notesInput').value;
        const type = transactionType;

        // If product not exist and type is IN => create new product
        if (!currentProductScan && type === 'IN') {
            let newName = prompt("New product! Enter product name:", "Unknown Item");
            if (!newName) return;
            let category = prompt("Category (optional)", "General");
            let unit = prompt("Unit (pcs/kg)", "pcs");
            try {
                await callApi('addNewProduct', { barcode, name: newName, category: category || '', unit: unit || 'pcs', initialStock: qty });
                await callApi('recordTransaction', { worker, barcode, productName: newName, type: "IN", qty, notes, stockAfter: qty });
                showToast(`New product ${newName} added with stock ${qty}`);
                resetScanForm();
                refreshDashboard();
                loadInventory();
            } catch (e) { showToast("Failed to create product", true); }
            return;
        }
        if (!currentProductScan && type === 'OUT') { showToast("Product not found! Cannot subtract", true); return; }

        // Normal transaction with existing product
        try {
            const result = await callApi('processTransaction', { worker, barcode, type, qty, notes });
            if (result.success) {
                showToast(`${type} ${qty} ${result.productName} → New stock: ${result.newStock}`);
                resetScanForm();
                refreshDashboard();
                loadInventory();
                if (type === 'OUT') lookupBarcode(barcode);
            } else throw new Error(result.error);
        } catch (e) { showToast(e.message, true); }
    }

    function resetScanForm() {
        document.getElementById('barcodeInput').value = '';
        document.getElementById('quantityInput').value = '1';
        document.getElementById('notesInput').value = '';
        document.getElementById('productInfoCard').classList.add('hidden');
        currentProductScan = null;
        if (html5Scanner && isScannerActive) {
            html5Scanner.stop().catch(e => {});
            document.getElementById('qrScannerContainer').style.display = 'none';
            isScannerActive = false;
        }
    }

    // Camera scanner init
    function initScanner() {
        if (html5Scanner) {
            html5Scanner.stop().then(() => {
                document.getElementById('qrScannerContainer').style.display = 'block';
                startQrCodeScanner();
            }).catch(() => { startQrCodeScanner(); });
        } else {
            document.getElementById('qrScannerContainer').style.display = 'block';
            startQrCodeScanner();
        }
    }

    function startQrCodeScanner() {
        const container = document.getElementById('qrScannerContainer');
        container.innerHTML = '<div id="reader" style="width:100%;"></div>';
        const html5QrCode = new Html5Qrcode("reader");
        html5Scanner = html5QrCode;
        const config = { fps: 10, qrbox: { width: 250, height: 150 } };
        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            document.getElementById('barcodeInput').value = decodedText;
            lookupBarcode(decodedText);
            html5QrCode.stop();
            container.style.display = 'none';
            isScannerActive = false;
        }, (err) => { console.warn(err); });
        isScannerActive = true;
    }

    // Event listeners & UI init
    function bindEvents() {
        document.getElementById('manualLookupBtn').addEventListener('click', () => lookupBarcode(document.getElementById('barcodeInput').value.trim()));
        document.getElementById('startScannerBtn').addEventListener('click', () => initScanner());
        document.getElementById('typeInBtn').addEventListener('click', () => {
            transactionType = "IN";
            document.getElementById('typeInBtn').classList.add('bg-green-200', 'text-green-800');
            document.getElementById('typeOutBtn').classList.remove('bg-red-200', 'text-red-800');
            document.getElementById('typeOutBtn').classList.add('bg-red-100', 'text-red-700');
        });
        document.getElementById('typeOutBtn').addEventListener('click', () => {
            transactionType = "OUT";
            document.getElementById('typeOutBtn').classList.add('bg-red-200', 'text-red-800');
            document.getElementById('typeInBtn').classList.remove('bg-green-200', 'text-green-800');
            document.getElementById('typeInBtn').classList.add('bg-green-100', 'text-green-700');
        });
        document.getElementById('confirmTransactionBtn').addEventListener('click', confirmTransaction);
        document.getElementById('qtyMinus').addEventListener('click', () => {
            let inp = document.getElementById('quantityInput');
            let val = parseInt(inp.value);
            if (val > 1) inp.value = val - 1;
        });
        document.getElementById('qtyPlus').addEventListener('click', () => {
            let inp = document.getElementById('quantityInput');
            let val = parseInt(inp.value);
            inp.value = val + 1;
        });
        document.getElementById('addWorkerBtn').addEventListener('click', async () => {
            let name = document.getElementById('newWorkerName').value.trim();
            if (!name) return;
            await callApi('addWorker', { workerName: name });
            showToast(`Worker ${name} added`);
            loadWorkers();
            document.getElementById('newWorkerName').value = '';
        });
        document.getElementById('saveProductBtn').addEventListener('click', saveProductEdit);
        document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('productModal').classList.add('hidden'));
        document.getElementById('invSearch').addEventListener('input', (e) => loadInventory(e.target.value));

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.add('hidden'));
                document.getElementById(`${tabId}Tab`).classList.remove('hidden');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'bg-blue-600', 'text-white'));
                btn.classList.add('tab-active', 'bg-blue-600', 'text-white');
                if (tabId === 'dashboard') refreshDashboard();
                if (tabId === 'inventory') loadInventory(document.getElementById('invSearch').value);
                if (tabId === 'workers') loadWorkers();
                if (tabId === 'scan') resetScanForm();
            });
        });
        // Default activate dashboard
        document.querySelector('.tab-btn[data-tab="dashboard"]').click();
    }

    async function initialLoad() {
        await loadWorkers();
        await refreshDashboard();
        bindEvents();
    }
    initialLoad();
</script>
</body>
</html>
